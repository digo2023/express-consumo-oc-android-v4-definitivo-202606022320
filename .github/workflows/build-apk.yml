name: Build APK Android Nativo - Express Consumo OC

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceitar licenças Android
        run: yes | sdkmanager --licenses || true

      - name: Instalar plataforma Android
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Configurar Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Ver arquivos do projeto
        run: |
          echo "Arquivos na raiz:"
          ls -la
          echo "Arquivos do app:"
          ls -la app || true

      - name: Compilar APK debug
        run: gradle assembleDebug --stacktrace --info

      - name: Listar APK criado
        run: |
          echo "Procurando APK gerado..."
          find . -name "*.apk" -type f

      - name: Enviar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: Express-Consumo-OC-APK-Nativo
          path: app/build/outputs/apk/debug/*.apk

      - name: Enviar logs se falhar
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
