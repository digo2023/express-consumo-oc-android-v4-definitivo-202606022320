name: Build APK Android Nativo - Express Consumo OC

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Dar permissão ao Gradle
        run: chmod +x ./gradlew

      - name: Compilar APK debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Listar APK criado
        run: |
          echo "Procurando APK gerado..."
          find . -name "*.apk" -type f

      - name: Enviar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: Express-Consumo-OC-APK-Nativo
          path: app/build/outputs/apk/debug/*.apk

      - name: Enviar log completo se reproduzir
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
